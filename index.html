<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Stock 120일 비교기</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 50px; }
        .container { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #1a1a1a; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 20px; font-size: 16px; }
        .info-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .price-card { background: #f8f9fa; padding: 15px; border-radius: 10px; text-align: center; }
        .label { font-size: 12px; color: #666; margin-bottom: 5px; }
        .price { font-size: 18px; font-weight: bold; }
        .result { margin-top: 25px; text-align: center; padding: 20px; border-top: 1px solid #eee; }
        .percent { font-size: 32px; font-weight: 800; }
        .up { color: #e03131; } /* 상승: 빨강 */
        .down { color: #1971c2; } /* 하락: 파랑 */
        .loading { color: #999; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>📈 종목 분석기</h2>
    
    <select id="stock-select" onchange="updateStockData()">
        <option value="">-- 종목을 선택하세요 --</option>
        <option value="005930.KS">삼성전자</option>
        <option value="000660.KS">SK하이닉스</option>
        <option value="035420.KS">NAVER</option>
        <option value="035720.KS">카카오</option>
        <option value="005380.KS">현대차</option>
        <option value="005490.KS">POSCO홀딩스</option>
        <option value="207940.KS">삼성바이오로직스</option>
        <option value="051910.KS">LG화학</option>
    </select>

    <div id="display-area" style="display: none;">
        <div class="info-box">
            <div class="price-card">
                <div class="label">현재가</div>
                <div id="curr-price" class="price">-</div>
            </div>
            <div class="price-card">
                <div class="label">120일 전 종가</div>
                <div id="old-price" class="price">-</div>
            </div>
        </div>

        <div class="result">
            <div class="label">120일 대비 수익률</div>
            <div id="change-percent" class="percent">0%</div>
        </div>
    </div>
    <div id="status" class="loading" style="text-align:center;">종목을 선택하면 데이터를 불러옵니다.</div>
</div>

<script>
async function updateStockData() {
    const symbol = document.getElementById('stock-select').value;
    const displayArea = document.getElementById('display-area');
    const status = document.getElementById('status');

    if (!symbol) {
        displayArea.style.display = 'none';
        status.style.display = 'block';
        return;
    }

    status.innerText = "데이터 불러오는 중...";
    displayArea.style.display = 'none';

    try {
        // Yahoo Finance API (CORS 우회를 위해 유효한 공개 프록시 등을 활용하거나 직접 호출)
        const response = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=200d`);
        const data = await response.json();
        
        const result = data.chart.result[0];
        const prices = result.indicators.quote[0].close.filter(p => p !== null);
        
        const currentPrice = prices[prices.length - 1];
        // 영업일 기준 약 120일 전 (데이터가 부족하면 가장 오래된 데이터)
        const oldPrice = prices[prices.length - 120] || prices[0]; 
        
        const diff = ((currentPrice - oldPrice) / oldPrice * 100).toFixed(2);
        const colorClass = diff >= 0 ? 'up' : 'down';
        const sign = diff >= 0 ? '+' : '';

        // UI 업데이트
        document.getElementById('curr-price').innerText = Math.round(currentPrice).toLocaleString() + "원";
        document.getElementById('old-price').innerText = Math.round(oldPrice).toLocaleString() + "원";
        
        const pctEl = document.getElementById('change-percent');
        pctEl.innerText = `${sign}${diff}%`;
        pctEl.className = `percent ${colorClass}`;

        status.style.display = 'none';
        displayArea.style.display = 'block';

    } catch (error) {
        status.innerText = "데이터를 가져오는데 실패했습니다.";
        console.error(error);
    }
}
</script>

</body>
</html>
